server:
  port: 8083
spring:
  application:
    name: file-integrity-service
  datasource:
    url: jdbc:postgresql://localhost:5432/fim_db
    username: watchtower
    password: watchtower_secret
  jpa:
    hibernate:
      ddl-auto: validate
  kafka:
    bootstrap-servers: localhost:29092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

watchtower:
  fim:
    watch-path: /tmp/watchtower-watch

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus

---
spring:
  config:
    activate:
      on-profile: docker
  datasource:
    url: jdbc:postgresql://postgres:5432/fim_db
  kafka:
    bootstrap-servers: kafka:9092
watchtower:
  fim:
    watch-path: /watch
