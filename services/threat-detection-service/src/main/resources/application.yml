server:
  port: 8082

spring:
  application:
    name: threat-detection-service
  datasource:
    url: jdbc:postgresql://localhost:5432/detection_db
    username: watchtower
    password: watchtower_secret
  jpa:
    hibernate:
      ddl-auto: validate
  kafka:
    bootstrap-servers: localhost:29092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
  data:
    redis:
      host: localhost
      port: 6379
  threads:
    virtual:
      enabled: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus

---
spring:
  config:
    activate:
      on-profile: docker
  datasource:
    url: jdbc:postgresql://postgres:5432/detection_db
  kafka:
    bootstrap-servers: kafka:9092
  data:
    redis:
      host: redis
